[build]
  command = "pnpm build"

[build.environment]
  # Disable secret scanning — NEXT_PUBLIC_* and config paths are expected in build output.
  # Re-enable in Netlify UI and set SECRETS_SCAN_OMIT_KEYS there if desired.
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
