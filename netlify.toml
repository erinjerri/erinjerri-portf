# Netlify: long-cache immutable assets + SWR for /media to cut repeat bytes (mobile Lighthouse).
[build]
  command = "pnpm run build:netlify"

[build.environment]
  # Node 20.x — Payload 3.7x+ and Next.js 16 prefer modern Node
  NODE_VERSION = "20"
  # Disable secret scanning — NEXT_PUBLIC_* and config paths are expected in build output.
  # If this still fails, set SECRETS_SCAN_ENABLED=false in Netlify UI: Site config → Environment variables.
  SECRETS_SCAN_ENABLED = "false"
  # Force webpack (avoids Turbopack ENOENT/FS issues on Netlify's ephemeral build containers)
  NEXT_PRIVATE_TURBOPACK = "0"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Public media (when served from the site origin) — long cache, SWR for updates.
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Next font / static media chunks (defensive; often covered by /_next/static/*).
[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
